<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- warm ambient glow -->
  <defs>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF8E0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="100%" stop-color="#C09860"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="20" r="20" fill="url(#glow1)"/>
  <!-- desk surface -->
  <rect x="6" y="28" width="36" height="4" rx="2" fill="url(#deskGrad)"/>
  <!-- desk legs -->
  <rect x="8" y="32" width="3" height="12" rx="1.5" fill="#B8956E"/>
  <rect x="37" y="32" width="3" height="12" rx="1.5" fill="#B8956E"/>
  <!-- ledger book -->
  <rect x="15" y="16" width="14" height="12" rx="3" fill="#FDF5E6" stroke="#D4A96A" stroke-width="1.5"/>
  <line x1="18" y1="21" x2="28" y2="21" stroke="#C0A880" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="24" x2="26" y2="24" stroke="#C0A880" stroke-width="1.2" stroke-linecap="round"/>
  <!-- quill pen -->
  <path d="M31 16 C33 10 37 6 39 4 C38 8 35 12 33 16Z" fill="#E8D0A0" stroke="#D4A96A" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="31" y1="16" x2="28" y2="22" stroke="#C8A878" stroke-width="1.2" stroke-linecap="round"/>
</svg>
